<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeekBox - Cadastro</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/cadastro.css">

</head>
<body>
    <div class="container">
        
        <div class="wrapper">
            <div class="logo-image"><img src="../assets/images/logo/logo-geekbox.png" alt=""></div>
            
            <div class="box">
                <div class="header-box">
                    <h1>
                        <span>Tudo que você</span>
                        <span>consome, em um</span>
                        <span id="highlight-span">único lugar.</span>
                    </h1>
                    <p>
                        Jogos, livros, filmes, séries, animes, mangás e músicas — rastreados, organizados e visualizados <span id="highlight-span-sub">do jeito que você merece.</span>
                    </p>
                </div>
                <div class="content-box">
                    <div class="header-content-box">
                        <h2>Crie a sua conta</h2>
                    </div>
                    <div class="label-box">
                        <div class="name-surname">
                            <input id="ipt_nome" type="text" placeholder="Nome">
                            <input id="ipt_sobrenome" type="text" placeholder="Sobrenome">
                        </div>
                        <div class="field-box">
                            <div class="field">
                                <input id="ipt_email" type="text" placeholder="Entre com seu email">
                            </div>
                            <div class="field">
                                <input id="ipt_senha" type="text" placeholder="Senha forte">
                            </div>
                            <div class="field">
                                <input id="ipt_senha_conf" type="text" placeholder="Confirme sua senha">
                            </div>
                            <div class="field">
                                <input id="ipt_telefone" type="text" placeholder="(11) 99999-9999">
                            </div>
                        </div>
                        <div class="btn-cadastro-div">
                            <button onclick="registerUser()" class="btn-cadastro">Cadastrar</button>
                        </div>
                        <div class="others">
                            <span>Já possui um cadastro?</span>
                            <span id="highlight-span-sub"><a href="../html/login.html">Fazer login.</a></span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/cadastro.js"></script>
</body>
</html>
