<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeekBox</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/hero.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/wishlist.css">
    <link rel="stylesheet" href="../css/modal.css">
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="shortcut icon" href="../assets/images/logo/Vector.png" type="image/x-icon">
</head>

<body>
    <div class="navbar-div">
        <nav class="navbar">
            <div class="navbar-logo">
                <img src="../assets/images/logo/logo-geekbox.png" alt="Logo Geekie Box">
            </div>
            <div>
                <li><a href="../html/cadastro.html" class="button-login">Logout</a></li>
            </div>
        </nav>
    </div>

    <section>

        <div class="container">
            <div class="header-container">

                <div class="header">
                    <div id="icon-image">
                        <img src="../assets/images/icons/spider-man-icon.png" alt="Foto de Perfil">
                    </div>
                    <div class="title">
                        <h1><span id="mensagem-hora"></span><span id="h1-span">João!</span></h1>
             
                        <h4>
                            <span id="welcome-subtitle"></span>
                            <span id="h4-span"></span>
                        </h4>
                    </div>
                </div>

                <div class="navigation-buttons">
                    <ul>
                        <li><a href="../html/home.html">Home</a></li>
                        <li><a href="../index.html">Timeline</a></li>
                        <li><a href="../html/wishlist.html">Wishlist</a></li>
                        <li><a href="../html/dashboard.html">Estatísticas</a></li>
                    </ul>
                </div>
            </div>

            <div class="content-container">
                <div class="content-wishlist anim-scale-in anim-d1">
                    
                    <div class="card-selected anim-fade-up anim-d2 dash-card">
                        <div class="content-selected" id="div-content-selected">
                            <div class="no-content">
                                <p>Selecione algum item</p>
                            </div>
                        </div>
                    </div>

                    <div class="items-list anim-scale-in anim-d1">
                        <div class="field-list-container">
                            <div id="field-list" class="list">
                                
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="../js/sessao.js"></script>
    <script src="../js/timeline.js"></script>
    <script src="../js/cadastroItem.js"></script>
    <script src="../js/updateItem.js"></script>
</body>

</html>
