<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeekBox</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/hero.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/wishlist.css">
    <link rel="stylesheet" href="../css/modal.css">
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="shortcut icon" href="../assets/images/logo/Vector.png" type="image/x-icon">
</head>

<body>
    <div class="navbar-div">
        <nav class="navbar">
            <div class="navbar-logo">
                <img src="../assets/images/logo/logo-geekbox.png" alt="Logo Geekie Box">
            </div>
            <div>
                <li><a href="../html/cadastro.html" class="button-login">Logout</a></li>
            </div>
        </nav>
    </div>

    <section>

        <div class="container">
            <div class="header-container">

                <div class="header">
                    <div id="icon-image">
                        <img src="../assets/images/icons/spider-man-icon.png" alt="Foto de Perfil">
                    </div>
                    <div class="title">
                        <h1><span id="mensagem-hora"></span><span id="h1-span">João!</span></h1>

                        <h4>
                            <span id="welcome-subtitle"></span>
                            <span id="h4-span"></span>
                        </h4>
                    </div>
                </div>

                <div class="navigation-buttons">
                    <ul>
                        <li><a href="../html/home.html">Home</a></li>
                        <li><a href="../html/timeline.html">Timeline</a></li>
                        <li><a href="../html/wishlist.html">Wishlist</a></li>
                        <li><a href="../html/dashboard.html">Estatísticas</a></li>
                    </ul>
                </div>
            </div>

            <div class="content-container">
                <div class="sugestao-ia">
                    <div class="dica-ia anim-scale-in anim-d1">
                        <img src="../assets/images/icons/robot.png" alt="">
                        <p><span>Dica do dia do NerdyIA</span></p>
                    </div>
                </div>
                <blockquote class="citacao-barra anim-fade-in anim-d2">
                    <p id="resposta-bobia"></p>
                </blockquote>

                <div class="home-items">
                    <div class="em-progresso-title anim-fade-up anim-d2">
                        <h4>EM PROGRESSO</h4>
                    </div>
                    <div class="progresso-items anim-fade-up anim-d3"></div>

                    <div class="em-progresso-title anim-fade-up anim-d2">
                        <h4>RECENTEMENTE CONCLUÍDOS</h4>
                    </div>
                    <div class="concluido-items anim-fade-up anim-d3"></div>
                </div>
            </div>

        </div>
    </section>

    <script src="../js/sessao.js"></script>
    <script src="../js/timeline.js"></script>
    <script src="../js/cadastroItem.js"></script>
    <script src="../js/updateItem.js"></script>
    <script src="../js/home.js"></script>
</body>

</html>
