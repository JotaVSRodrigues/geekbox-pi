<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeekBox</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/hero.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/wishlist.css">
    <link rel="shortcut icon" href="../assets/images/logo/Vector.png" type="image/x-icon">
</head>
<body>
    <div class="navbar-div">
        <nav class="navbar">
            <div class="navbar-logo">
                <img src="../assets/images/logo/logo-geekbox.png" alt="Logo Geekie Box">
            </div>
            <div>
                <li><a href="../html/cadastro.html" class="button-login">Login</a></li>
            </div>
        </nav>
    </div>

    <section>
        <div class="container">
            <div class="header-container">

                <div class="header">
                    <div id="icon-image">
                        <img src="../assets/images/icons/spider-man-icon.png" alt="Foto de Perfil">
                    </div>
                    <div class="title">
                        <h1><span id="mensagem-hora"></span><span id="h1-span">João!</span></h1>
                        <h4>Você estava assistindo <span id="h4-span">Devoradores de Estrelas</span>
                        </h4>
                    </div>
                </div>
                
                <div class="navigation-buttons">
                    <ul>
                        <li><a href="../index.html">Home</a></li>
                        <li><a href="../html/timeline.html">Timeline</a></li>
                        <li><a href="../html/wishlist.html">Wishlist</a></li>
                        <li><a href="../html/dashboard.html">Estatísticas</a></li>
                    </ul>
                </div>
            </div>

            <div class="content-container">
                <div class="content-wishlist anim-scale-in anim-d1">
                    <div class="card-selected anim-fade-up anim-d2">
                        <div class="content-selected">
                            <h2>Devoradores de Estrelas</h2>
                            <img id="poster-image-wishlist" src="../assets/images/poster/project-hail-mary-poster.jpg" alt="">
                            <div class="card-information">
                                <span>Categoria: Filme</span>
                                <span>Horas: 2h45min</span>
                                <span>Nota: 4.6/5</span>
                                <span>Abr 24 2026</span>
                            </div>
                        </div>
                    </div>

                    <div class="items-list anim-scale-in anim-d1">
                        <div class="buttons-items">
                            <div class="btn-cadastro-div anim-fade-up anim-d3">
                                <button class="btn-cadastro btn-wishlist">Metas</button>
                            </div>

                            <div class="btn-cadastro-div anim-fade-up anim-d3">
                                <button onclick="addItem()" class="btn-cadastro  btn-wishlist">+ Novo item</button>
                            </div>
                        </div>
                        <div id="field-list" class="list">
                    
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="../js/sessao.js"></script>
    <script src="../js/wishlist.js"></script>
</body>
</html>
