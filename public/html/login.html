<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeekBox - Cadastro</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/cadastro.css">
    <script src="../js/sessao.js"></script>
    <link rel="shortcut icon" href="../assets/images/logo/Vector.png" type="image/x-icon">
</head>
<body>
    <div class="container">
        
        <div class="wrapper">
            <div class="logo-image"><img src="../assets/images/logo/logo-geekbox.png" alt=""></div>
            
            <div class="box">
                <div class="header-box">
                    <h1>
                        <span>Tudo que você</span>
                        <span>consome, em um</span>
                        <span id="highlight-span">único lugar.</span>
                    </h1>
                    <p>
                        Jogos, livros, filmes, séries, animes, mangás e músicas — rastreados, organizados e visualizados <span id="highlight-span-sub">do jeito que você merece.</span>
                    </p>
                </div>
                <div class="content-box">
                    <div class="header-content-box">
                        <h2>Acesse sua coleção</h2>
                    </div>
                    <div class="label-box">
                        <div class="field-box">
                            <div class="field">
                                <input id="ipt_email_login" type="text" placeholder="Entre com seu email">
                            </div>
                            <div class="field">
                                <input id="ipt_senha_login" type="text" placeholder="Coloque sua senha">
                            </div>
                        </div>
                        <div class="btn-cadastro-div">
                            <button onclick="loginUser()" class="btn-cadastro">Login</button>
                        </div>
                        <div class="others">
                            <span>Não possui login?</span>
                            <span id="highlight-span-sub"><a href="../html/cadastro.html">Cadastrar-se.</a></span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/login.js"></script>
</body>
</html>
